name: Beta Release

on:
  push:
    branches: [beta]

permissions:
  contents: write

concurrency:
  group: beta-release
  cancel-in-progress: false

env:
  PROJECT: PrismCore.csproj
  PACK_ID: PrismCore
  ICON: Assets/app.ico

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      pack_version: ${{ steps.meta.outputs.pack_version }}
      create_tag: ${{ steps.meta.outputs.create_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 诊断脚本文件状态
        shell: bash
        run: |
          echo "=== file 命令检测编码 ==="
          file .github/scripts/*.sh
          echo "=== hexdump 检查前 32 字节 ==="
          for f in .github/scripts/*.sh; do
            echo "--- $f ---"
            hexdump -C "$f" | head -2
          done
          echo "=== cat -v 检查不可见字符（前 3 行）==="
          head -3 .github/scripts/prepare-beta.sh | cat -v
          echo "=== git 配置 ==="
          git config --list | grep -iE 'autocrlf|eol|encoding' || echo '无相关配置'

      - name: 生成预发布元数据
        id: meta
        shell: bash
        run: bash -x .github/scripts/prepare-beta.sh

      - name: 创建 beta 标签
        if: steps.meta.outputs.create_tag == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.meta.outputs.tag }}" -m "beta release ${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: 上传 beta 发布说明
        uses: actions/upload-artifact@v4
        with:
          name: beta-release-notes
          path: release-notes/${{ steps.meta.outputs.tag }}.md

  build:
    needs: prepare
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            platform: x64
          - rid: win-arm64
            platform: ARM64
          - rid: win-x86
            platform: x86
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: NuGet 缓存
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ matrix.rid }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ matrix.rid }}-

      - name: 安装 Velopack CLI
        run: dotnet tool install -g vpk --version 0.0.1298

      - name: 发布
        timeout-minutes: 30
        run: >
          dotnet publish ${{ env.PROJECT }}
          -c Release
          -r ${{ matrix.rid }}
          -p:Platform=${{ matrix.platform }}
          -p:WindowsPackageType=None
          -p:SelfContained=true
          -p:PublishReadyToRun=true
          --output publish/${{ matrix.rid }}

      - name: Velopack 打包
        run: >
          vpk pack
          --packId ${{ env.PACK_ID }}
          --packVersion ${{ needs.prepare.outputs.pack_version }}
          --packDir publish/${{ matrix.rid }}
          --packTitle PrismCore
          --packAuthors WSXYT
          --mainExe PrismCore.exe
          --icon ${{ env.ICON }}
          --outputDir Releases
          --channel ${{ matrix.rid }}
          --shortcuts Desktop,StartMenuRoot

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: beta-${{ matrix.rid }}
          path: Releases/*
          retention-days: 14

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 下载安装包
        uses: actions/download-artifact@v4
        with:
          pattern: beta-win-*
          path: artifacts
          merge-multiple: true

      - name: 下载发布说明
        uses: actions/download-artifact@v4
        with:
          name: beta-release-notes
          path: notes

      - name: 定位发布说明文件
        id: notes
        shell: bash
        run: |
          note_path="$(find notes -type f -name '*.md' | head -n 1)"
          final_body="notes/final-body.md"
          cat "$note_path" > "$final_body"
          echo "" >> "$final_body"
          cat .github/release-body-footer.md >> "$final_body"
          echo "note_path=$final_body" >> "$GITHUB_OUTPUT"

      - name: 创建 GitHub 预发布
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: PrismCore ${{ needs.prepare.outputs.tag }} [预发布]
          body_path: ${{ steps.notes.outputs.note_path }}
          prerelease: true
          make_latest: false
          files: artifacts/*
