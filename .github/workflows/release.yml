name: Build & Release

on:
  push:
    branches: ['**']
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 1.0.0)'
        required: true

permissions:
  contents: write

env:
  PROJECT: PrismCore.csproj
  PACK_ID: PrismCore
  ICON: Assets/app.ico
  ADMIN_MANIFEST: artifacts/setup-admin.manifest

jobs:
  build:
    runs-on: windows-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (contains(github.event.head_commit.message, '开始打包') && !startsWith(github.ref, 'refs/tags/'))
    strategy:
      matrix:
        include:
          - rid: win-x64
            platform: x64
          - rid: win-arm64
            platform: ARM64
          - rid: win-x86
            platform: x86

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 跳过重复运行
        if: "!startsWith(github.ref, 'refs/tags/')"
        shell: bash
        run: |
          if git tag --points-at HEAD | grep -q '^v'; then
            echo "::notice::当前 commit 已有 v* 标签，由 tag 事件负责构建，跳过此次运行"
            exit 1
          fi

      - name: 解析版本号
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            # 从 csproj 读取版本号
            VER=$(sed -n 's/.*<Version>\(.*\)<\/Version>.*/\1/p' ${{ env.PROJECT }})
            if [ -z "$VER" ]; then
              echo "::error::csproj 中未找到 <Version> 标签"
              exit 1
            fi
            echo "version=${VER}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: 安装 Velopack CLI
        run: dotnet tool install -g vpk

      - name: 发布
        timeout-minutes: 45
        run: >
          dotnet publish ${{ env.PROJECT }}
          -c Release
          -r ${{ matrix.rid }}
          -p:Platform=${{ matrix.platform }}
          -p:WindowsPackageType=None
          -p:SelfContained=true
          -p:PublishReadyToRun=true
          -p:CrossgenParallelism=1
          --output publish/${{ matrix.rid }}

      - name: Velopack 打包
        run: >
          vpk pack
          --packId ${{ env.PACK_ID }}
          --packVersion ${{ steps.version.outputs.version }}
          --packDir publish/${{ matrix.rid }}
          --packTitle PrismCore
          --packAuthors WSXYT
          --mainExe PrismCore.exe
          --icon ${{ env.ICON }}
          --outputDir Releases
          --channel ${{ matrix.rid }}
          --shortcuts Desktop,StartMenuRoot

      - name: 嵌入管理员 manifest 到 Setup.exe
        shell: pwsh
        run: |
          $mtExe = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\mt.exe" -Recurse |
                   Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $mtExe) { throw "mt.exe not found" }
          Get-ChildItem Releases\*-Setup.exe | ForEach-Object {
            Write-Host "嵌入 manifest: $($_.Name)"
            & $mtExe.FullName -manifest ${{ env.ADMIN_MANIFEST }} "-outputresource:$($_.FullName);#1" -nologo
          }

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: Releases/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PrismCore 新版本 - ${{ github.ref_name }}
          body: |
            ## 产物说明

            ### 安装包（首次安装）
            | 文件 | 适用架构 |
            |------|----------|
            | `PrismCore-*-win-x64-Setup.exe` | 64 位 Intel/AMD（大多数电脑） |
            | `PrismCore-*-win-arm64-Setup.exe` | ARM64（Surface Pro X、骁龙笔记本等） |
            | `PrismCore-*-win-x86-Setup.exe` | 32 位系统 |

            双击 Setup.exe 安装，系统会弹出 UAC 提权提示，确认后自动完成安装。
            安装后桌面和开始菜单会创建快捷方式。

            ### 增量更新包（应用内自动使用）
            - `*.nupkg` — Velopack 增量更新包，已安装用户通过应用内更新功能自动下载
            - `releases.*.json` — 更新索引文件，供客户端检查版本

            > 普通用户只需下载对应架构的 **Setup.exe** 即可。
          files: artifacts/*
