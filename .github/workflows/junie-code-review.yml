name: Junie Code Review

env:
  JUNIE_MODEL: opus

on:
  pull_request:
    types: [opened, synchronize]
    branches: [dev, beta, master]

jobs:
  # 自动代码审查：PR 创建或更新时触发（内置 code-review prompt）
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: JetBrains/junie-github-action@v0
        with:
          junie_api_key: ${{ secrets.JUNIE_API_KEY }}
          prompt: code-review
          model: ${{ env.JUNIE_MODEL }}
          use_single_comment: "true"
